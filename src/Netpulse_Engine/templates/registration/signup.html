<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netpulse // Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        
        .network-bg {
            background-image: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                              url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=1934&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        
        input { 
            width: 100%; 
            background: #f8fafc; 
            border: 1px solid #cbd5e1; 
            padding: 10px 12px; 
            border-radius: 6px; 
            font-size: 14px; 
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="network-bg text-slate-100 min-h-screen flex flex-col items-center justify-center font-sans p-4">

    <div class="mb-8 text-center">
        <div class="flex items-center justify-center space-x-3 mb-2">
            <i class="fa-solid fa-square-poll-vertical text-emerald-400 text-4xl animate-pulse"></i>
            <span class="text-3xl font-black tracking-wider text-white">NETPULSE ENGINE</span>
        </div>
        <p class="text-xs tracking-widest text-emerald-400 uppercase font-bold">Automated Network Management Node</p>
    </div>

    <div class="max-w-sm w-full p-8 bg-slate-900/90 backdrop-blur-md border border-slate-800/80 rounded-2xl shadow-2xl space-y-6">
        <div>
            <h2 class="text-xl font-bold text-white text-center">Create New Account</h2>
            <p class="text-xs text-slate-400 text-center mt-1">Provision brand new administrative access security keys.</p>
        </div>
        
        <form method="post" class="space-y-4 text-slate-900">
            {% csrf_token %}
            {% for field in form %}
                <div class="space-y-1">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-300">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-xs text-rose-400 font-medium mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-sm rounded-lg transition-all duration-150 transform active:scale-[0.99] mt-6 shadow-md shadow-emerald-500/10">
                Register 
            </button>
        </form>
        
        <div class="text-center pt-2 border-t border-slate-800/60">
            <p class="text-xs text-slate-400">
                Already registered? 
                <a href="{% url 'login' %}" class="text-emerald-400 hover:text-emerald-300 hover:underline font-medium">Log in here</a>
            </p>
        </div>
    </div>

</body>
</html>
