<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netpulse // Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center font-sans">
    <div class="max-w-sm w-full p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-xl space-y-6">
        <div>
            <h2 class="text-2xl font-black text-white text-center">Create New Account</h2>
            <p class="text-xs text-slate-400 text-center mt-1">Provision a brand new administrative account security keys</p>
        </div>
        <form method="post" class="space-y-4 text-slate-900">
            {% csrf_token %}
            {% for field in form %}
                <div class="space-y-1">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-300">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<p class="text-xs text-rose-400 font-medium">{{ field.errors.0 }}</p>{% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-sm rounded-lg transition mt-4">Register Profile</button>
        </form>
        <div class="text-center"><p class="text-xs text-slate-400">Already registered? <a href="{% url 'login' %}" class="text-emerald-400 hover:underline">Log in here</a></p></div>
    </div>
    <style>input { width: 100%; background: #f8fafc; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; font-size: 14px; }</style>
</body>
</html>
